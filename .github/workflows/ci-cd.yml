name: CI/CD MediShop Todo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      front: ${{ steps.filter.outputs.front }}
      back: ${{ steps.filter.outputs.back }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            front:
              - 'frontend/**'
              - 'deploy/deploy_front.sh'
              - '.github/workflows/ci-cd.yml'
            back:
              - 'backend/**'
              - 'deploy/deploy_back.sh'
              - '.github/workflows/ci-cd.yml'

  build-front:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.front == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST }}/${{ secrets.FRONT_IMAGE }}:${{ github.sha }}
            ${{ secrets.REGISTRY_HOST }}/${{ secrets.FRONT_IMAGE }}:latest

  build-back:
    needs: changes
    if: github.event_name == 'workflow_dispatch' || needs.changes.outputs.back == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST }}/${{ secrets.BACK_IMAGE }}:${{ github.sha }}
            ${{ secrets.REGISTRY_HOST }}/${{ secrets.BACK_IMAGE }}:latest

  deploy-front:
    needs: [changes, build-front]
    if: always() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.front == 'true') && needs.build-front.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Préparer SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
          FRONT_HOST: ${{ secrets.FRONT_HOST }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$FRONT_HOST" >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host front
            HostName $FRONT_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/id_rsa
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
      - name: Déployer Front
        env:
          IMAGE: ${{ secrets.REGISTRY_HOST }}/${{ secrets.FRONT_IMAGE }}:${{ github.sha }}
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          scp deploy/deploy_front.sh front:/tmp/deploy_front.sh
          ssh front \
            "echo '$REGISTRY_PASSWORD' | docker login '$REGISTRY_HOST' -u '$REGISTRY_USERNAME' --password-stdin && chmod +x /tmp/deploy_front.sh && /tmp/deploy_front.sh '$IMAGE'"

  deploy-back:
    needs: [changes, build-back]
    if: always() && (github.event_name == 'workflow_dispatch' || needs.changes.outputs.back == 'true') && needs.build-back.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Préparer SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
          FRONT_HOST: ${{ secrets.FRONT_HOST }}
          BACK_PRIVATE_IP: ${{ secrets.BACK_PRIVATE_IP }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$FRONT_HOST" >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host front
            HostName $FRONT_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/id_rsa
            IdentitiesOnly yes
            StrictHostKeyChecking yes

          Host back
            HostName $BACK_PRIVATE_IP
            User $SSH_USER
            IdentityFile ~/.ssh/id_rsa
            IdentitiesOnly yes
            ProxyJump front
            StrictHostKeyChecking no
          EOF
      - name: Déployer Back via bastion
        env:
          IMAGE: ${{ secrets.REGISTRY_HOST }}/${{ secrets.BACK_IMAGE }}:${{ github.sha }}
          REGISTRY_HOST: ${{ secrets.REGISTRY_HOST }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          DB_HOST: ${{ secrets.DB_PRIVATE_IP }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          scp deploy/deploy_back.sh back:/tmp/deploy_back.sh
          ssh back \
            "echo '$REGISTRY_PASSWORD' | docker login '$REGISTRY_HOST' -u '$REGISTRY_USERNAME' --password-stdin && chmod +x /tmp/deploy_back.sh && DB_HOST='$DB_HOST' DB_NAME='$DB_NAME' DB_USER='$DB_USER' DB_PASSWORD='$DB_PASSWORD' /tmp/deploy_back.sh '$IMAGE'"
