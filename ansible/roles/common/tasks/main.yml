- name: Mettre à jour le cache APT
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Installer les dépendances système
  ansible.builtin.apt:
    name: [ca-certificates, curl, gnupg, python3-docker, python3-pip]
    state: present

- name: Créer le répertoire des clés APT
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Ajouter la clé Docker
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Ajouter le dépôt Docker
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Installer Docker
  ansible.builtin.apt:
    name: [docker-ce, docker-ce-cli, containerd.io, docker-buildx-plugin, docker-compose-plugin]
    state: present
    update_cache: true

- name: Activer Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Ajouter ubuntu au groupe docker
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true

- name: Créer le répertoire applicatif
  ansible.builtin.file:
    path: "/opt/{{ project_name }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'
